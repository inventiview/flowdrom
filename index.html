<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flowdrom</title>
  
  <!-- CodeMirror CSS (vendored locally — no external CDN) -->
  <link rel="stylesheet" href="src/vendor/codemirror/codemirror.min.css">
  
  <style>
    /* App chrome lives in src/css/style.css. The rendered/exported diagram's
       own styling is generated by buildDiagramCss() in src/js/main.js and
       embedded in the SVG — the single source of truth, so no diagram classes
       are duplicated here. */

    /* Hide the original textarea but keep it for compatibility */
    #input {
      display: none;
    }
    
      /* Make autocomplete menu bigger */
    .CodeMirror-hints {
    max-width: 400px !important;     /* Increase width */
    min-width: 300px !important;     /* Set minimum width */
    max-height: 300px !important;    /* Increase height */
    font-size: 14px !important;      /* Larger text */    
    }

    .CodeMirror-hint {
    padding: 8px 12px !important;    /* More padding for bigger items */
    line-height: 1.4 !important;     /* Better line spacing */
    }

    .CodeMirror-hint-active {
    background: #2a5eb2 !important;  /* Match your theme colors */
    color: white !important;
    }

  </style>

  <!-- Design tokens + base layer (Apple-UI redesign). Loaded last so its base
       rules win over the inline <style> above during the phased migration. -->
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
  <div class="app" id="app">

    <!-- Unified toolbar (replaces the gradient banner + button row) -->
    <header class="toolbar">
      <div class="toolbar__lead">
        <button class="icon-btn" id="toggle-code" type="button" aria-label="Toggle source pane"
                title="Toggle source pane" onclick="toggleCodePane()">
          <svg viewBox="0 0 16 16" width="16" height="16" aria-hidden="true">
            <rect x="1.5" y="2.5" width="13" height="11" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.3"/>
            <line x1="6.25" y1="2.5" x2="6.25" y2="13.5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
        <span class="toolbar__title">Flowdrom</span>
      </div>

      <div class="toolbar__actions">
        <button class="btn" type="button" onclick="(window.flowdromNewDiagram||newDiagram)()">New</button>
        <button class="btn" type="button" onclick="flowdromUndo()" title="Undo (Ctrl/Cmd+Z)">Undo</button>
        <button class="btn" type="button" onclick="flowdromRedo()" title="Redo (Ctrl/Cmd+Shift+Z)">Redo</button>
        <button class="btn btn--primary" type="button" onclick="(window.flowdromRender||renderGraph)()">Render</button>
        <button class="btn" type="button" onclick="canonizeJson()"
                title="Sort, order and compact the JSON to the canonical guide style">Canonize</button>
        <button class="btn" type="button" onclick="(window.flowdromFitCanvas||function(){})()"
                title="Fit the diagram to the canvas and resume auto-fit on resize (after manual Ctrl+wheel zoom)">Fit</button>
        <button class="btn" type="button" onclick="(window.flowdromArrange||function(){})()"
                title="Auto-arrange: tidy spacing and reduce overlaps, keeping every element's order in time (one undo step)">Arrange</button>
        <span class="toolbar__sep" aria-hidden="true"></span>
        <button class="btn" type="button" onclick="exportSVG(true)">Export SVG</button>
        <button class="btn" type="button" onclick="exportPNG()">Export PNG</button>
        <button class="btn" type="button" onclick="document.getElementById('svgFileInput').click()">Load SVG</button>
        <input type="file" id="svgFileInput" accept=".svg" hidden onchange="loadSVGFile(event)">
        <a href="docs/" class="toolbar__link">Guide</a>
      </div>
    </header>

    <div class="workspace">

      <!-- Source pane (collapsible) -->
      <aside class="pane pane--code" id="code-pane">
        <div class="pane__header">
          <span class="pane__title">Source</span>
        </div>
        <div class="pane__body">
          <p class="pane__caption">
            Transaction JSON — use <code>|</code> for line breaks. Prefix a lane name or message
            label with <code>&gt;</code>/<code>&lt;</code> to nudge it (20px each); info boxes accept
            a <code>&lt;x,y&gt;</code> pixel offset, e.g. <code>&lt;70,-50&gt;Info</code>.
          </p>

          <!-- Hidden textarea for compatibility with existing main.js -->
      <textarea id="input" rows="21">{
  title: 'Conflict: Two CAs ReadUnique Same Address',
  options: { message: { textSize: 15, textColor: 'default' } },
  lanes: ['CA0', 'CA1', 'HN'],
  infoBoxes: [{ lane: 'HN', time: 2, text: '<70,-50>Conflict detected|serialize requests' }],
  messages: [
    { path: 'CA0->HN', label: 'Read|Unique(A)',  color: 'red',    style: 'solid',  fromTime: 0, toTime: 1 },
    { path: 'CA1->HN', label: '<Read|Unique(A)', color: 'red',    style: 'dashed', fromTime: 1, toTime: 2 },
    { path: 'HN->CA1', label: 'SnpInvalid(A)',   color: 'purple', style: 'solid',  fromTime: 1, toTime: 4 },
    { path: 'CA1->HN', label: 'SnpResp(I)',      color: 'green',  style: 'solid',  fromTime: 4, toTime: 6 }
  ],
  states: [
    { lane: 'CA0', label: 'I->UD', color: 'yellow', fromTime: 0, toTime: 0.5 },
    { lane: 'CA1', label: 'S->I',  color: 'orange', fromTime: 4, toTime: 4.5 },
    { lane: 'HN',  label: 'block', color: 'pink', fromTime: 2, toTime: 6 },
  ],
  legend: [
    { label: 'Request',    color: 'red',    style: 'solid' },
    { label: 'Conflicted', color: 'red',    style: 'dashed' },
    { label: 'Snoop',      color: 'purple', style: 'solid' },
    { label: 'Response',   color: 'green',  style: 'solid' },
  ]
}</textarea>

          <!-- CodeMirror editor container -->
          <div class="editor-wrap">
            <div class="editor-btns">
              <button type="button" class="copy-json-btn" title="Replace the JSON with the clipboard contents (Ctrl+Z undoes)" onclick="pasteEditorJson(this)">Paste</button>
              <button type="button" class="copy-json-btn" title="Copy JSON to clipboard" onclick="copyEditorJson(this)">Copy</button>
            </div>
            <div id="codemirror-container"></div>
          </div>
        </div>
      </aside>

      <!-- Draggable divider: resize source pane vs. canvas -->
      <div class="splitter" id="splitter" role="separator" aria-orientation="vertical"
           aria-label="Resize source pane" tabindex="0"></div>

      <!-- Canvas stage — the document, now the dominant region -->
      <main class="stage">
        <h1 id="graph-title" style="display: none;">Enhanced Transaction Sequence Graph</h1>
        <div id="svg-container"></div>
      </main>

    </div>
  </div>

  <!-- CodeMirror Core (vendored locally) -->
  <script src="src/vendor/codemirror/codemirror.min.js"></script>

  <!-- CodeMirror JavaScript Mode -->
  <script src="src/vendor/codemirror/mode/javascript/javascript.min.js"></script>

  <!-- CodeMirror Addons for dynamic features -->
  <script src="src/vendor/codemirror/addon/edit/closebrackets.min.js"></script>
  <script src="src/vendor/codemirror/addon/edit/matchbrackets.min.js"></script>
  <script src="src/vendor/codemirror/addon/hint/show-hint.min.js"></script>

  <!-- CodeMirror Hint CSS -->
  <link rel="stylesheet" href="src/vendor/codemirror/addon/hint/show-hint.min.css">
  
  <script src="src/js/json5.min.js"></script>
  
  <!-- Simple Snippet Autocomplete -->
  <script>
    // Simple snippet-based autocomplete
    CodeMirror.registerHelper("hint", "snippets", function(editor, options) {
      const cur = editor.getCursor();
      const curLine = editor.getLine(cur.line);
      let start = cur.ch, end = cur.ch;
      
      // Find word boundaries
      while (start && /\w/.test(curLine.charAt(start - 1))) --start;
      while (end < curLine.length && /\w/.test(curLine.charAt(end))) ++end;
      
      const word = curLine.slice(start, end).toLowerCase();
      
      // Define simple snippets
      const snippets = {
        'legend': `legend: [
    { label: 'Request', color: 'red', style: 'solid' },
    { label: 'Response', color: 'green', style: 'solid' },
    { label: 'Snoop', color: 'purple', style: 'solid' },
  ],`,
        'messages': `messages: [
    { path: 'Source->Target', label: 'Message', color: 'red', style: 'solid', fromTime: 0, toTime: 1 },
  ],`,
        'lanes': `lanes: ['Source', 'Target'],`,
        'states': `states: [
    { lane: 'Source', label: 'State', color: 'yellow', fromTime: 0, toTime: 0.5 },
  ],`,
        'infoboxes': `infoBoxes: [
    { lane: 'Target', time: 2, text: 'Info text here' },
  ],`,
        'lanegroups': `laneGroups: [
    { label: 'Group Name', lanes: ['Source', 'Target'] },
  ],`,
        'title': `title: 'Your Diagram Title',`,
        'options': `options: {
    lane:    { textSize: 'default', textColor: 'default' },
    message: { textSize: 15, textColor: 'default' },
  },`
      };
      
      const suggestions = [];
      for (const key in snippets) {
        if (key.startsWith(word)) {
          suggestions.push({
            text: snippets[key],
            displayText: key + " (snippet)"
          });
        }
      }
      
      if (suggestions.length === 0) return null;
      
      return {
        list: suggestions,
        from: CodeMirror.Pos(cur.line, start),
        to: CodeMirror.Pos(cur.line, end)
      };
    });
  </script>
  
  <!-- CodeMirror initialization script -->
  <script>
    let codeMirrorEditor;
    
    document.addEventListener('DOMContentLoaded', () => {
      // Get the hidden textarea
      const textarea = document.getElementById('input');
      
      // Create CodeMirror editor with snippet autocomplete
      codeMirrorEditor = CodeMirror(document.getElementById('codemirror-container'), {
        value: textarea.value,
        mode: 'javascript',
        theme: 'default',
        lineNumbers: true,
        indentUnit: 2,
        tabSize: 2,
        indentWithTabs: false,
        matchBrackets: true,
        autoCloseBrackets: true,
        lineWrapping: true,
        extraKeys: {
          "Tab": function(cm) {
            // If autocomplete is active, accept the completion
            if (cm.state.completionActive && cm.state.completionActive.widget) {
              cm.state.completionActive.widget.pick();
            } else {
              // Otherwise, handle normal tab behavior
              if (cm.somethingSelected()) {
                cm.indentSelection("add");
              } else {
                cm.replaceSelection("  ", "end");
              }
            }
          }
        }
      });
      
      // Simple autocomplete on typing
      codeMirrorEditor.on("keyup", function(cm, event) {
        // Don't trigger if already active or on Enter
        if (!cm.state.completionActive && event.keyCode !== 13) {
          // Only trigger on letters
          if (/[a-zA-Z]/.test(String.fromCharCode(event.keyCode))) {
            CodeMirror.showHint(cm, CodeMirror.hint.snippets, {
              completeSingle: false,
              alignWithWord: true,
              closeCharacters: /[\s()\[\]{};:>,]/,
              closeOnUnfocus: true
            });
          }
        }
      });
      
      // Sync CodeMirror content with hidden textarea
      codeMirrorEditor.on('change', function() {
        textarea.value = codeMirrorEditor.getValue();
      });
      
      // Draggable source/canvas divider
      initSplitter();

      // Auto-render on page load
      renderGraph();
    });
    
    // Optional: Function to update CodeMirror content programmatically
    function updateCodeMirrorContent(content) {
      if (codeMirrorEditor) {
        codeMirrorEditor.setValue(content);
      }
    }

    // Draggable divider between the source pane and the canvas. Adjusts the
    // pane width within sensible bounds and refreshes CodeMirror after a drag.
    function initSplitter() {
      const splitter = document.getElementById('splitter');
      const pane = document.getElementById('code-pane');
      const ws = document.querySelector('.workspace');
      if (!splitter || !pane || !ws) return;
      let dragging = false;
      splitter.addEventListener('pointerdown', (e) => {
        dragging = true;
        splitter.classList.add('dragging');
        try { splitter.setPointerCapture(e.pointerId); } catch (_) {}
        e.preventDefault();
      });
      splitter.addEventListener('pointermove', (e) => {
        if (!dragging) return;
        const wsRect = ws.getBoundingClientRect();
        const min = 260, max = Math.max(min, wsRect.width - 260);
        let w = Math.max(min, Math.min(max, e.clientX - wsRect.left));
        pane.style.flex = '0 0 ' + w + 'px';
        pane.style.width = w + 'px';
      });
      const end = (e) => {
        if (!dragging) return;
        dragging = false;
        splitter.classList.remove('dragging');
        try { splitter.releasePointerCapture(e.pointerId); } catch (_) {}
        if (codeMirrorEditor) codeMirrorEditor.refresh();
      };
      splitter.addEventListener('pointerup', end);
      splitter.addEventListener('pointercancel', end);
    }

    // Replace the editor with a minimal valid diagram (2 lanes + 1 message) so
    // the user can start a new diagram and build on it graphically. Replaces
    // current content immediately (use the editor's undo to revert).
    // Collapse/expand the source pane. Refresh CodeMirror when it reappears so
    // it re-measures against the restored width.
    function toggleCodePane() {
      const app = document.getElementById('app');
      app.classList.toggle('code-collapsed');
      if (!app.classList.contains('code-collapsed') && codeMirrorEditor) {
        setTimeout(() => codeMirrorEditor.refresh(), 0);
      }
    }

    // Start a brand-new, empty diagram. The empty lanes/messages arrays keep the
    // structure valid and give the graphical editor arrays to insert into, while
    // the renderer (main.js) tolerates the empty canvas. Build it up by
    // right-clicking the canvas to add lanes, then messages/states/etc.
    function newDiagram() {
      const tpl = [
        '{',
        "  title: 'Untitled',",
        '  lanes: [],',
        '  messages: [],',
        '}'
      ].join('\n');
      document.getElementById('input').value = tpl;
      if (codeMirrorEditor) codeMirrorEditor.setValue(tpl);
      renderGraph();
    }

    // Tidy the current JSON: parse it and re-emit through the canonical formatter
    // (sorted/ordered keys, compact one-line elements, inline options). On a
    // parse error, leave the text untouched and let renderGraph surface it.
    function canonizeJson() {
      const ta = document.getElementById('input');
      try {
        const formatted = formatConfig(JSON5.parse(ta.value));
        ta.value = formatted;
        if (codeMirrorEditor) codeMirrorEditor.setValue(formatted);
        renderGraph();
      } catch (e) {
        renderGraph(); // shows the JSON error box
      }
    }

    // Copy the editor's JSON to the clipboard; briefly flips the button label.
    function copyEditorJson(btn) {
      const text = codeMirrorEditor ? codeMirrorEditor.getValue() : document.getElementById('input').value;
      const flash = () => {
        if (!btn) return;
        const prev = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = prev; }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(flash).catch(() => fallbackCopy(text, flash));
      } else {
        fallbackCopy(text, flash);
      }
    }
    function fallbackCopy(text, done) {
      const t = document.createElement('textarea');
      t.value = text;
      t.style.cssText = 'position:fixed;top:-1000px;left:-1000px;';
      document.body.appendChild(t);
      t.focus(); t.select();
      try { document.execCommand('copy'); done && done(); } catch (e) { /* ignore */ }
      document.body.removeChild(t);
    }

    // Replace the editor's JSON with the clipboard contents and re-render (the
    // overwrite is a single CodeMirror history step, so Ctrl+Z restores the
    // previous text). Clipboard READ is permission-gated and unavailable in some
    // browsers/contexts — on failure, hint at plain Ctrl+V instead of erroring.
    // Invalid JSON is pasted anyway: the canvas shows the usual parse-error box,
    // exactly as if it had been typed.
    function pasteEditorJson(btn) {
      const flash = (label) => {
        if (!btn) return;
        const prev = btn.textContent;
        btn.textContent = label;
        setTimeout(() => { btn.textContent = prev; }, 1600);
      };
      if (!(navigator.clipboard && navigator.clipboard.readText)) { flash('Use Ctrl+V'); return; }
      navigator.clipboard.readText().then((text) => {
        if (!text || !text.trim()) { flash('Empty'); return; }
        document.getElementById('input').value = text;
        if (codeMirrorEditor) codeMirrorEditor.setValue(text);
        renderGraph();
        flash('Pasted!');
      }).catch(() => flash('Use Ctrl+V'));
    }
  </script>

  <!-- load your renderer -->
  <script src="src/js/main.js?v=13"></script>

  <!-- graphical editor layer (browser-only; never loaded by the headless engine/extension) -->
  <script src="src/js/editor.js?v=21"></script>
</body>
