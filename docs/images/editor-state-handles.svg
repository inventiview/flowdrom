<svg xmlns="http://www.w3.org/2000/svg" id="temp-graph" width="670" height="382" viewBox="0 0 670 382" preserveAspectRatio="xMidYMid meet" style="max-width: none; height: auto;"><style>
    .label-box { fill: white; stroke: none; }
    .state-box { fill: #ffffcc; stroke: #aaa; rx: 4; ry: 4; }
    .lane-label { font-weight: bold; font-size: 18px; text-anchor: middle; fill: #2a5eb2; font-family: Helvetica, Arial, sans-serif; }
    /* Time-gap labels use the same face as lane labels; size/color are configurable. */
    .time-gap-label { font-weight: bold; font-size: 13px; text-anchor: middle; fill: #6b7280; font-family: Helvetica, Arial, sans-serif; }
    .sub-lane-label { font-weight: bold; font-size: 12px; text-anchor: middle; fill: #2a5eb2; font-family: Helvetica, Arial, sans-serif; }
    /* Repeated lane labels: a distinct guide style so they don't read as ordinary
       message/state text. Three variants (options.graph.labelStyle); opacity is
       set per-group inline from options.graph.opacity. */
    .lane-label-repeat { pointer-events: none; }
    /* outline: hollow, colored letters (true "word-art" outline) */
    .lane-label-repeat.outline .lane-label { fill: none; stroke: #2a5eb2; stroke-width: 1.3px; stroke-linejoin: round; }
    .lane-label-repeat.outline .sub-lane-label { fill: none; stroke: #2a5eb2; stroke-width: 1px; stroke-linejoin: round; }
    /* white: white letters with a colored outline */
    .lane-label-repeat.white .lane-label { fill: #ffffff; stroke: #2a5eb2; stroke-width: 3px; paint-order: stroke; stroke-linejoin: round; }
    .lane-label-repeat.white .sub-lane-label { fill: #ffffff; stroke: #2a5eb2; stroke-width: 2px; paint-order: stroke; stroke-linejoin: round; }
    /* solid: colored letters with a white halo (chunky, reads solid on white) */
    .lane-label-repeat.solid .lane-label, .lane-label-repeat.solid .sub-lane-label { paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px; stroke-linejoin: round; }
    .lane-group-label { font-weight: bold; font-size: 14px; text-anchor: middle; fill: #6699cc; font-family: Helvetica, Arial, sans-serif; }
    .lane-group-bracket { stroke: #6699cc; stroke-width: 2; stroke-dasharray: 4,4; fill: none; }
    .message-label { font-size: 15px; font-family: 'Courier New', monospace; dominant-baseline: middle; font-weight: bold; }
    .state-label { font-size: 11px; fill: black; font-family: Helvetica, Arial, sans-serif; text-anchor: middle; }
    .arrow { stroke-width: 2; }
    .dashed { stroke-dasharray: 5,5; }
    .time-label { font-size: 12px; fill: #666; font-family: Helvetica, Arial, sans-serif; }
    .grid-line { stroke: #eee; stroke-width: 1; }
    .legend-box { fill: white; stroke: #ccc; stroke-width: 1; rx: 6; ry: 6; }
    .legend-title { font-weight: bold; font-size: 16px; fill: #2a5eb2; font-family: Helvetica, Arial, sans-serif; }
    .legend-label { font-size: 27px; font-family: 'Courier New', monospace; dominant-baseline: middle; }
    .info-box { fill: white; stroke: #333; stroke-width: 1; rx: 4; ry: 4; }
    .info-box-text { font-size: 12px; font-family: Helvetica, Arial, sans-serif; fill: #333; }
    .info-box-line { stroke: #333; stroke-width: 1; stroke-dasharray: 3,3; fill: none; }
    /* Interaction frames (PlantUML-style): a thin bordered region with a cut-corner
       label tab at the top-left. Transparent interior so it scopes without hiding. */
    .frame-box { fill: none; stroke: #888; stroke-width: 1.2; }
    .frame-tab { fill: #f3f3f3; stroke: #888; stroke-width: 1.2; }
    .frame-label { font-size: 13px; font-weight: bold; font-family: Helvetica, Arial, sans-serif; fill: #666; }
